apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-submit-results
spec:
  description: Archive accepted patches and publish a summary report.
  workspaces:
    - name: source
  steps:
    - name: summarise
      image: quay.io/jwesterl/scar-agent:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        RESULTS="$WS/.scar/scar-results.json"
        REJECTED="$WS/.scar/scar-rejected.json"

        if [ ! -f "$RESULTS" ]; then
          echo "No results file found — nothing to submit"
          exit 0
        fi

        SEP="============================================================"
        echo ""
        echo "$SEP"
        NACC=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1]))))" "$RESULTS")
        echo "  ACCEPTED PATCHES ($NACC)"
        echo "$SEP"
        python3 -c "
        import json, sys
        from pathlib import Path
        for p in json.load(open(sys.argv[1])):
            f = p['finding']
            t = p.get('triage', {})
            nm = Path(f['file_path']).name
            conf = '{:.2f}'.format(t.get('confidence', 0)) if t else 'n/a'
            print('  OK  [' + p['origin'] + '] ' + f['rule_id'] + ' @ ' + nm + ':' + str(f['line']) + '  conf=' + conf)
            reason = (t.get('reason') or '')[:120]
            if reason:
                print('      ' + reason)
        " "$RESULTS"

        if [ -f "$REJECTED" ]; then
          echo ""
          echo "$SEP"
          NREJ=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1]))))" "$REJECTED")
          echo "  REJECTED FINDINGS ($NREJ)"
          echo "$SEP"
          python3 -c "
        import json, sys
        from pathlib import Path
        for r in json.load(open(sys.argv[1])):
            f = r['finding']
            nm = Path(f['file_path']).name
            st = r.get('rejected_at', '?')
            rs = (r.get('reason') or '')[:120]
            print('  XX  [' + r['origin'] + '] ' + f['rule_id'] + ' @ ' + nm + ':' + str(f['line']) + '  stage=' + st)
            if rs:
                print('      ' + rs)
          " "$REJECTED"
        fi

        echo "$SEP"
        echo ""
