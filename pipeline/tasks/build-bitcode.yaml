apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-build-bitcode
spec:
  description: Compile C source to LLVM bitcode using native clang (x86).
  params:
    - name: source-dir
      description: Path within the workspace containing C source files
      default: "."
  workspaces:
    - name: source
      description: Shared workspace containing the target C repository
  steps:
    - name: emit-llvm
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        SRC="$WS/$(params.source-dir)"
        BCDIR="$WS/.scar/bitcode"
        CCDB="$WS/.scar/compile_commands.json"

        mkdir -p "$BCDIR"

        # Generate compile_commands.json so the validator can use exact per-file flags.
        if [ -f "$SRC/CMakeLists.txt" ]; then
          echo "Detected CMakeLists.txt — extracting compile commands via cmake"
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -B "$BCDIR/cmake-build" "$SRC" 2>&1 | tail -3 || true
          if [ -f "$BCDIR/cmake-build/compile_commands.json" ]; then
            cp "$BCDIR/cmake-build/compile_commands.json" "$CCDB"
            echo "compile_commands.json generated from CMake ($(wc -l < "$CCDB") lines)"
          fi
        elif [ -f "$SRC/Makefile" ]; then
          echo "Detected Makefile — capturing compile commands via bear"
          cd "$SRC" && bear --output "$CCDB" -- make 2>&1 | tail -3 || true
          if [ -f "$CCDB" ]; then
            echo "compile_commands.json generated from bear+make ($(wc -l < "$CCDB") lines)"
          fi
        elif [ -f "$SRC/build.sh" ]; then
          echo "Detected OSS-Fuzz build.sh — capturing compile commands via bear"
          # Set the standard OSS-Fuzz environment so build.sh runs correctly.
          # Disable sanitizers/fuzzing instrumentation; we want plain clang output.
          # Use OUT/WORK/SRC as OSS-Fuzz expects; BCDIR is kept separate for bitcode.
          export SRC="$SRC"
          export WORK="$WS/.scar/oss-work"
          export OUT="$WS/.scar/oss-out"
          export CC=clang
          export CXX=clang++
          export CFLAGS="-O0 -g"
          export CXXFLAGS="-O0 -g"
          export LIB_FUZZING_ENGINE="-lFuzzer"
          export SANITIZER=none
          mkdir -p "$WORK" "$OUT"
          cd "$SRC" && bear --output "$CCDB" -- bash build.sh 2>&1 | tail -5 || true
          if [ -f "$CCDB" ]; then
            echo "compile_commands.json generated from OSS-Fuzz build.sh ($(wc -l < "$CCDB") lines)"
          fi
        else
          echo "No build system detected — validator will use -I parent fallback"
        fi

        find "$SRC" -name "*.c" | while read -r f; do
          rel="${f#$SRC/}"
          bc="$BCDIR/${rel%.c}.bc"
          mkdir -p "$(dirname "$bc")"
          if clang -c -emit-llvm -g -O0 \
               -Xclang -disable-O0-optnone \
               "$f" -o "$bc" 2>/dev/null; then
            echo "bitcode: $bc"
          else
            echo "skip: $f (missing headers — use source-dir= to scope to a sub-project with its own build system)"
          fi
        done

        echo "bitcode compilation complete"
