apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-build-bitcode
spec:
  description: Compile C source to LLVM bitcode using native clang (x86).
  params:
    - name: source-dir
      description: Path within the workspace containing C source files
      default: "."
  workspaces:
    - name: source
      description: Shared workspace containing the target C repository
  steps:
    - name: detect-build-system
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        SRC="$WS/$(params.source-dir)"
        BCDIR="$WS/.scar/bitcode"
        CCDB="$WS/.scar/compile_commands.json"

        mkdir -p "$BCDIR"

        # Generate compile_commands.json so the validator can use exact per-file flags.
        if [ -f "$SRC/CMakeLists.txt" ]; then
          echo "Detected CMakeLists.txt — extracting compile commands via cmake"
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -B "$BCDIR/cmake-build" "$SRC" 2>&1 | tail -3 || true
          if [ -f "$BCDIR/cmake-build/compile_commands.json" ]; then
            cp "$BCDIR/cmake-build/compile_commands.json" "$CCDB"
            echo "compile_commands.json generated from CMake ($(wc -l < "$CCDB") lines)"
          fi
        elif [ -f "$SRC/Makefile" ]; then
          echo "Detected Makefile — capturing compile commands via bear"
          cd "$SRC" && bear --output "$CCDB" -- make 2>&1 | tail -3 || true
          if [ -f "$CCDB" ]; then
            echo "compile_commands.json generated from bear+make ($(wc -l < "$CCDB") lines)"
          fi
        elif [ -f "$SRC/build.sh" ]; then
          echo "Detected OSS-Fuzz build.sh — capturing compile commands via bear"
          # Set the standard OSS-Fuzz environment so build.sh runs correctly.
          # Disable sanitizers/fuzzing instrumentation; we want plain clang output.
          # Use OUT/WORK/SRC as OSS-Fuzz expects; BCDIR is kept separate for bitcode.
          export SRC="$SRC"
          export WORK="$WS/.scar/oss-work"
          export OUT="$WS/.scar/oss-out"
          export CC=clang
          export CXX=clang++
          export CFLAGS="-O0 -g"
          export CXXFLAGS="-O0 -g"
          export LIB_FUZZING_ENGINE="-lFuzzer"
          export SANITIZER=none
          mkdir -p "$WORK" "$OUT"
          cd "$SRC" && bear --output "$CCDB" -- bash build.sh 2>&1 | tail -5 || true
          if [ -f "$CCDB" ]; then
            echo "compile_commands.json generated from OSS-Fuzz build.sh ($(wc -l < "$CCDB") lines)"
          fi
        else
          echo "No build system detected — validator will use -I parent fallback"
        fi

    - name: emit-llvm
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/usr/bin/env python3
        import json, subprocess, shlex
        from pathlib import Path

        ws    = "$(workspaces.source.path)"
        src   = ws + "/$(params.source-dir)"
        bcdir = ws + "/.scar/bitcode"
        ccdb_path = ws + "/.scar/compile_commands.json"

        Path(bcdir).mkdir(parents=True, exist_ok=True)
        src_path = Path(src).resolve()

        if Path(ccdb_path).exists():
            print("Emitting bitcode using compile_commands.json flags", flush=True)
            entries  = json.load(open(ccdb_path))

            # Per the LLVM compilation database spec, "file" may be relative to
            # "directory". Always join and resolve together so that relative keys
            # like "../../src/input.c" produce the correct absolute path for lookup.
            ccdb_map = {}
            for e in entries:
                if e.get("file") and e.get("directory"):
                    abs_file = str((Path(e["directory"]) / e["file"]).resolve())
                    ccdb_map[abs_file] = e

            for f in sorted(src_path.rglob("*.c")):
                rel = f.relative_to(src_path)
                bc  = Path(bcdir) / rel.parent / (rel.stem + ".bc")
                bc.parent.mkdir(parents=True, exist_ok=True)

                entry = ccdb_map.get(str(f.resolve()))
                flags, build_cwd = [], str(f.parent)
                if entry:
                    parts = shlex.split(entry.get("command", ""))
                    i = 1
                    while i < len(parts):
                        p = parts[i]
                        if p in ("-I", "-D", "-isystem", "-iquote") and i + 1 < len(parts):
                            flags += [p, parts[i + 1]]; i += 2
                        elif p.startswith(("-I", "-D", "-isystem", "-iquote", "-std=")):
                            flags.append(p); i += 1
                        else:
                            i += 1
                    build_cwd = entry.get("directory", build_cwd)

                cmd = ["clang", "-c", "-emit-llvm", "-g", "-O0", "-Xclang", "-disable-O0-optnone"] \
                      + flags + ["-o", str(bc), str(f)]
                r = subprocess.run(cmd, capture_output=True, text=True, cwd=build_cwd)
                if r.returncode == 0:
                    print(f"bitcode: {bc}", flush=True)
                else:
                    err = r.stderr.splitlines()[0] if r.stderr else "clang error"
                    print(f"skip: {f} ({err})", flush=True)
        else:
            print("No compile_commands.json — attempting standalone compilation", flush=True)
            for f in sorted(src_path.rglob("*.c")):
                rel = f.relative_to(src_path)
                bc  = Path(bcdir) / rel.parent / (rel.stem + ".bc")
                bc.parent.mkdir(parents=True, exist_ok=True)
                cmd = ["clang", "-c", "-emit-llvm", "-g", "-O0",
                       "-Xclang", "-disable-O0-optnone", "-o", str(bc), str(f)]
                r = subprocess.run(cmd, capture_output=True, text=True)
                if r.returncode == 0:
                    print(f"bitcode: {bc}", flush=True)
                else:
                    print(f"skip: {f} (missing headers — use source-dir= to scope to a sub-project with its own build system)", flush=True)

        print("bitcode compilation complete", flush=True)
