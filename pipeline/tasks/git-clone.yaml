apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  description: Clone a public git repository into the output Workspace.
  workspaces:
    - name: output
  params:
    - name: url
      type: string
      description: Repository URL to clone from.
    - name: revision
      type: string
      default: "main"
      description: Branch, tag, or SHA to checkout.
  results:
    - name: commit
      description: The commit SHA that was checked out.
  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -eu
        git clone --depth=1 --branch "$(params.revision)" \
          "$(params.url)" "$(workspaces.output.path)"
        cd "$(workspaces.output.path)"
        git rev-parse HEAD | tr -d '\n' | tee "$(results.commit.path)"
