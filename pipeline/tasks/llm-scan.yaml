apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-llm-scan
spec:
  description: >
    LLM vulnerability scan (nano-analyzer Stage 2). Scans all C files in the
    workspace for zero-day bugs the static analyzer cannot model — string
    function overflows, type confusion, logic errors, protocol bugs.
    Writes .scar/llm-findings.json for consumption by the repair-loop task.
  workspaces:
    - name: source
      description: Shared workspace containing the cloned C repository
  steps:
    - name: scan
      image: quay.io/jwesterl/scar-agent:latest
      env:
        - name: LLM_BASE_URL
          valueFrom:
            secretKeyRef:
              name: scar-llm-credentials
              key: base_url
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: scar-llm-credentials
              key: api_key
        - name: LLM_MODEL
          valueFrom:
            secretKeyRef:
              name: scar-llm-credentials
              key: model
      script: |
        #!/bin/bash
        set -euo pipefail
        python3 -u -m scar.scan_cmd $(workspaces.source.path)
