apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-ikos-analyze
spec:
  description: Run NASA IKOS on each LLVM bitcode file and emit a merged SARIF report.
  workspaces:
    - name: source
      description: Shared workspace; reads .scar/bitcode/*.bc, writes .scar/results.sarif
  steps:
    - name: ikos
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        BCDIR="$WS/.scar/bitcode"
        OUT_DIR="$WS/.scar"
        SARIF_DIR="$OUT_DIR/sarif"
        mkdir -p "$SARIF_DIR"

        # Collect library bitcode — exclude fuzzer harnesses which have no
        # regular exported API and cause IKOS to abort on missing entry points.
        mapfile -t bc_files < <(find "$BCDIR" -name "*.bc" | sort | grep -iv "fuzz")

        if [ ${#bc_files[@]} -eq 0 ]; then
          echo "No bitcode files to analyze"
          exit 0
        fi

        echo "Bitcode modules to link:"
        printf '  %s\n' "${bc_files[@]}"

        # Count how many modules define 'main'. Standalone test programs (e.g.
        # scar-test-c) each have their own main — linking would fail with
        # "symbol multiply defined". Single-binary targets (e.g. nginx) have
        # exactly one main and benefit from interprocedural whole-program linking.
        main_count=0
        for f in "${bc_files[@]}"; do
          c=$(llvm-dis-14 -o - "$f" 2>/dev/null | grep -c '^define.*@main(' || true)
          main_count=$((main_count + c))
        done

        if [ "$main_count" -gt 1 ]; then
          echo "Multiple 'main' symbols detected ($main_count) — analyzing each file independently"
          for bc in "${bc_files[@]}"; do
            name=$(basename "$bc" .bc)
            echo "Analyzing $name..."
            ikos \
              --entry-points=main \
              --analyses=boa,dbz,nullity,uva,sio,dfa \
              --output-db="$OUT_DIR/${name}.db" \
              "$bc" || true
            if [ -f "$OUT_DIR/${name}.db" ]; then
              ikos-report --format=sarif "$OUT_DIR/${name}.db" \
                > "$SARIF_DIR/${name}.sarif" || true
              echo "-> $SARIF_DIR/${name}.sarif"
            else
              echo "WARNING: ikos did not produce a db for $name"
            fi
          done
        else
          # Link individual translation units into one whole-program module so
          # IKOS can perform true interprocedural abstract interpretation across
          # module boundaries (e.g. trace a buffer from parse.c into session.c).
          echo "Linking into whole_program.bc..."
          llvm-link "${bc_files[@]}" -o "$OUT_DIR/whole_program.bc"

          raw_symbols=$(llvm-dis-14 -o - "$OUT_DIR/whole_program.bc" 2>/dev/null \
            | grep '^define ' \
            | grep -v 'internal\|private\|@llvm\.' \
            | sed -E 's/.*@([a-zA-Z_][a-zA-Z0-9_]*)\(.*/\1/' || true)

          # Use all public non-main API functions as entry points.
          # IKOS then analyses each function with fully unconstrained inputs —
          # one call frame deep — preserving the abstract-interval precision
          # that degrades over deep whole-program chains from main.
          # Cap at 150 symbols to avoid ARG_MAX on large targets like Nginx.
          # Fall back to main only when no other public symbols exist.
          api_symbols=$(echo "$raw_symbols" | grep -v '^main$' | head -n 150)
          if [ -n "$api_symbols" ]; then
            api_count=$(echo "$api_symbols" | wc -l | tr -d ' ')
            entry_pts=$(echo "$api_symbols" | paste -sd, -)
            echo "Entry points: $api_count public API functions (non-main)"
          else
            entry_pts="main"
            echo "Entry points: main (no other public symbols found)"
          fi

          ikos \
            --entry-points="$entry_pts" \
            --analyses=boa,dbz,nullity,uva,sio,dfa \
            --output-db="$OUT_DIR/whole_program.db" \
            "$OUT_DIR/whole_program.bc" || true

          if [ -f "$OUT_DIR/whole_program.db" ]; then
            ikos-report --format=sarif "$OUT_DIR/whole_program.db" \
              > "$SARIF_DIR/whole_program.sarif" || true
            echo "-> $SARIF_DIR/whole_program.sarif"
          else
            echo "WARNING: ikos did not produce a db"
          fi
        fi

    - name: merge-sarif
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/usr/bin/env python3
        import json, glob

        sarif_dir = "/workspace/source/.scar/sarif"
        out_path  = "/workspace/source/.scar/results.sarif"

        merged = {
            "version": "2.1.0",
            "runs": []
        }
        for f in sorted(glob.glob(f"{sarif_dir}/*.sarif")):
            data = json.load(open(f))
            merged["runs"].extend(data.get("runs", []))

        json.dump(merged, open(out_path, "w"), indent=2)
        print(f"Merged {len(merged['runs'])} IKOS run(s) -> {out_path}")

    - name: cppcheck
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)

        # Scan only the source tree, not .scar/ build artifacts.
        cppcheck \
          --enable=warning \
          --xml \
          --suppress=missingIncludeSystem \
          -i "$WS/.scar" \
          "$WS" 2>"$WS/.scar/cppcheck.xml" || true
        echo "Cppcheck XML written to .scar/cppcheck.xml"

    - name: convert-cppcheck
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/usr/bin/env python3
        import json, xml.etree.ElementTree as ET
        from pathlib import Path

        ws       = Path("/workspace/source")
        xml_path = ws / ".scar" / "cppcheck.xml"
        out_path = ws / ".scar" / "findings-cppcheck.json"

        KEEP_SEVERITY = {"error", "warning"}
        SEVERITY_MAP  = {"error": "high", "warning": "medium"}

        if not xml_path.exists():
            print("[cppcheck-convert] cppcheck.xml not found — skipping")
            out_path.write_text("[]")
            raise SystemExit(0)

        try:
            tree = ET.parse(xml_path)
        except ET.ParseError as exc:
            print(f"[cppcheck-convert] XML parse error: {exc} — skipping")
            out_path.write_text("[]")
            raise SystemExit(0)

        findings = []
        for error in tree.iterfind(".//error"):
            sev = error.get("severity", "")
            if sev not in KEEP_SEVERITY:
                continue

            cwe_raw = error.get("cwe", "")
            rule_id = f"CWE-{cwe_raw}" if cwe_raw else f"cppcheck/{error.get('id', 'unknown')}"
            msg     = error.get("verbose") or error.get("msg", "")

            loc = error.find("location")
            if loc is None:
                continue
            file_path = loc.get("file", "")
            try:
                line = int(loc.get("line", 0))
            except ValueError:
                line = 0
            try:
                col = int(loc.get("column", 0))
            except ValueError:
                col = 0

            if not file_path or line == 0:
                continue

            findings.append({
                "rule_id":   rule_id,
                "severity":  SEVERITY_MAP[sev],
                "file_path": file_path,
                "line":      line,
                "column":    col,
                "message":   msg,
            })

        out_path.write_text(json.dumps(findings, indent=2))
        print(f"[cppcheck-convert] {len(findings)} finding(s) -> {out_path}")
