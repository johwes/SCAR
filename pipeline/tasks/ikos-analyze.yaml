apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-ikos-analyze
spec:
  description: Run NASA IKOS on each LLVM bitcode file and emit a merged SARIF report.
  workspaces:
    - name: source
      description: Shared workspace; reads .scar/bitcode/*.bc, writes .scar/results.sarif
  steps:
    - name: ikos
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        BCDIR="$WS/.scar/bitcode"
        SARIF_DIR="$WS/.scar/sarif"
        mkdir -p "$SARIF_DIR"

        find "$BCDIR" -name "*.bc" | while read -r bc; do
          name="$(basename "${bc%.bc}")"

          # Skip fuzzer harness — it has no main() and no regular API entry points.
          if echo "$name" | grep -qi "fuzz"; then
            echo "skip (fuzzer harness): $bc"
            continue
          fi

          db="$WS/.scar/${name}.db"
          sarif="$SARIF_DIR/${name}.sarif"

          echo "analyzing: $bc"

          # Derive entry points by disassembling the bitcode to LLVM IR and
          # extracting non-internal function definitions. llvm-dis is used
          # because llvm-nm does not reliably read LLVM bitcode in all
          # container environments.
          entry_pts=$(llvm-dis -o - "$bc" 2>/dev/null \
            | grep '^define ' \
            | grep -v 'internal\|private\|@llvm\.' \
            | sed -E 's/.*@([a-zA-Z_][a-zA-Z0-9_]*)\(.*/\1/' \
            | paste -sd, - || true)
          if [ -z "$entry_pts" ]; then
            entry_pts="main"
          fi
          echo "  entry points: $entry_pts"

          ikos \
            --entry-points="$entry_pts" \
            --analyses=boa,dbz,nullity,uva,sio,dfa \
            --output-db="$db" \
            "$bc" || true

          if [ -f "$db" ]; then
            ikos-report --format=sarif "$db" > "$sarif" || true
            echo "  -> $sarif"
          else
            echo "  WARNING: ikos did not produce a db for $bc — skipping report"
          fi
        done

    - name: merge-sarif
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/usr/bin/env python3
        import json, glob

        sarif_dir = "/workspace/source/.scar/sarif"
        out_path  = "/workspace/source/.scar/results.sarif"

        merged = {
            "version": "2.1.0",
            "runs": []
        }
        for f in sorted(glob.glob(f"{sarif_dir}/*.sarif")):
            data = json.load(open(f))
            merged["runs"].extend(data.get("runs", []))

        json.dump(merged, open(out_path, "w"), indent=2)
        print(f"Merged {len(merged['runs'])} IKOS run(s) -> {out_path}")

    - name: cppcheck
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)

        cppcheck \
          --enable=warning,portability \
          --xml \
          "$WS" 2>"$WS/.scar/cppcheck.xml" || true
        echo "Cppcheck XML written to .scar/cppcheck.xml"
