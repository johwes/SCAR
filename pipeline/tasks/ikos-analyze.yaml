apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-ikos-analyze
spec:
  description: Run NASA IKOS on each LLVM bitcode file and emit a merged SARIF report.
  workspaces:
    - name: source
      description: Shared workspace; reads .scar/bitcode/*.bc, writes .scar/results.sarif
  steps:
    - name: ikos
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        BCDIR="$WS/.scar/bitcode"
        SARIF_DIR="$WS/.scar/sarif"
        mkdir -p "$SARIF_DIR"

        find "$BCDIR" -name "*.bc" | while read -r bc; do
          name="$(basename "${bc%.bc}")"
          db="$WS/.scar/${name}.db"
          sarif="$SARIF_DIR/${name}.sarif"

          echo "analyzing: $bc"
          ikos \
            --entry-points=main \
            --analyses=boa,dbz,nullity \
            --output-db="$db" \
            "$bc" || true

          ikos-report --format=sarif "$db" > "$sarif"
          echo "  -> $sarif"
        done

    - name: merge-sarif
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/usr/bin/env python3
        import json, glob

        sarif_dir = "/workspace/source/.scar/sarif"
        out_path  = "/workspace/source/.scar/results.sarif"

        merged = {
            "version": "2.1.0",
            "runs": []
        }
        for f in sorted(glob.glob(f"{sarif_dir}/*.sarif")):
            data = json.load(open(f))
            merged["runs"].extend(data.get("runs", []))

        json.dump(merged, open(out_path, "w"), indent=2)
        print(f"Merged {len(merged['runs'])} IKOS run(s) -> {out_path}")

    - name: cppcheck
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)

        cppcheck \
          --enable=warning,portability \
          --output-file="$WS/.scar/cppcheck.sarif" \
          --output-format=sarif \
          "$WS"
        echo "Cppcheck SARIF written to .scar/cppcheck.sarif"
