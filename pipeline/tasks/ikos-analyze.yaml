apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scar-ikos-analyze
spec:
  description: Run NASA IKOS on each LLVM bitcode file and emit a merged SARIF report.
  workspaces:
    - name: source
      description: Shared workspace; reads .scar/bitcode/*.bc, writes .scar/results.sarif
  steps:
    - name: ikos
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)
        BCDIR="$WS/.scar/bitcode"
        SARIF_DIR="$WS/.scar/sarif"
        mkdir -p "$SARIF_DIR"

        find "$BCDIR" -name "*.bc" | while read -r bc; do
          name="$(basename "${bc%.bc}")"
          db="$WS/.scar/${name}.db"
          sarif="$SARIF_DIR/${name}.sarif"

          echo "analyzing: $bc"

          # Derive entry points from the bitcode's exported text symbols.
          # Full executables expose 'main'; library objects expose their API.
          # Using llvm-nm avoids hard-coding function names per project.
          entry_pts=$(llvm-nm --defined-only --extern-only "$bc" 2>/dev/null \
            | awk '$2 == "T" { print $3 }' | paste -sd, -)
          if [ -z "$entry_pts" ]; then
            entry_pts="main"
          fi
          echo "  entry points: $entry_pts"

          ikos \
            --entry-points="$entry_pts" \
            --analyses=boa,dbz,nullity,uva,sio,dfa \
            --output-db="$db" \
            "$bc" || true

          ikos-report --format=sarif "$db" > "$sarif"
          echo "  -> $sarif"
        done

    - name: merge-sarif
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/usr/bin/env python3
        import json, glob

        sarif_dir = "/workspace/source/.scar/sarif"
        out_path  = "/workspace/source/.scar/results.sarif"

        merged = {
            "version": "2.1.0",
            "runs": []
        }
        for f in sorted(glob.glob(f"{sarif_dir}/*.sarif")):
            data = json.load(open(f))
            merged["runs"].extend(data.get("runs", []))

        json.dump(merged, open(out_path, "w"), indent=2)
        print(f"Merged {len(merged['runs'])} IKOS run(s) -> {out_path}")

    - name: cppcheck
      image: quay.io/jwesterl/scar-ikos:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        WS=$(workspaces.source.path)

        cppcheck \
          --enable=warning,portability \
          --xml \
          "$WS" 2>"$WS/.scar/cppcheck.xml" || true
        echo "Cppcheck XML written to .scar/cppcheck.xml"
